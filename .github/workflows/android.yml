name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install All System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma-dev uuid-dev tar libbz2-dev
        sudo apt-get install -y zip unzip autoconf automake libtool pkg-config patch cmake ninja-build python3-dev sqlite3 libsqlite3-dev
        sudo apt-get install -y openjdk-17-jdk

    - name: Install Python Tools
      run: |
        python -m pip install --upgrade pip setuptools wheel virtualenv
        pip install "cython<3.0" buildozer
        export PATH=$PATH:$HOME/.local/bin

    - name: Auto-Configure Buildozer Spec Perfectly
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        # ضبط المكتبات والصلاحيات
        sed -i 's/requirements = python3, kivy/requirements = python3, kivy, requests/g' buildozer.spec
        sed -i 's/#android.permissions = .*/android.permissions = INTERNET/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = vodafonecash/g' buildozer.spec
        sed -i 's/title = My Application/title = Vodafone Cash App/g' buildozer.spec
        
        # ضبط التوافقية مع جافا 17 والأندرويد الحديث لمنع قفلة الـ Gradle
        sed -i 's/android.api = .*/android.api = 34/g' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/g' buildozer.spec
        sed -i 's/#android.ndk_api = .*/android.ndk_api = 21/g' buildozer.spec

    - name: Build APK with Buildozer
      run: |
        export PATH=$PATH:$HOME/.local/bin
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VodafoneCash-APK
        path: bin/*.apk
